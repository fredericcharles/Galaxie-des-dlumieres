<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codes Secrets</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a0f2e;
    --surface: #241540;
    --surface2: #2e1a52;
    --border: #4a2d7a;
    --accent: #c084fc;
    --accent2: #f0abfc;
    --gold: #fbbf24;
    --success: #86efac;
    --error: #fca5a5;
    --text: #f3e8ff;
    --dim: #7c5fa0;
    --orange: #ff8c00;
    --glow: 0 0 24px #c084fc55;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: var(--bg);
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, #3b1d6e55 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 80% 80%, #1e0d4022 0%, transparent 60%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Crimson Pro', Georgia, serif;
    padding: 20px;
    overflow: hidden;
    position: relative;
  }

  .stars { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
  .star {
    position: absolute; background: white; border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite var(--delay);
  }
  @keyframes twinkle {
    0%, 100% { opacity: var(--min-op); transform: scale(1); }
    50%       { opacity: var(--max-op); transform: scale(1.4); }
  }

  .container {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
    gap: 20px; width: 100%; max-width: 520px;
  }

  /* Header */
  .header { text-align: center; }
  .header h1 {
    font-family: 'Playfair Display', serif; font-weight: 900;
    font-size: clamp(1.5rem, 5vw, 2.4rem);
    color: var(--accent2); text-shadow: 0 0 30px #c084fc66;
    letter-spacing: 0.05em; margin-bottom: 4px;
  }
  .header .subtitle {
    font-style: italic; font-size: 0.9rem;
    color: var(--dim); letter-spacing: 0.1em;
  }

  /* Panel */
  .panel {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px 20px; width: 100%;
    box-shadow: 0 0 0 1px #ffffff08 inset, 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
  }
  .panel::before {
    content: '✦'; position: absolute; top: -10px; left: 50%;
    transform: translateX(-50%); background: var(--surface);
    padding: 0 12px; color: var(--accent); font-size: 1rem;
    text-shadow: var(--glow);
  }

  /* Display */
  .display { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; }
  .letter-slot {
    width: 50px; height: 58px;
    border-bottom: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 1.7rem; font-weight: 700;
    color: var(--accent2); text-shadow: 0 0 12px #c084fc88;
    transition: border-color 0.2s, opacity 0.2s; position: relative; flex-shrink: 0;
  }
  .letter-slot.inactive { opacity: 0.12; }
  .letter-slot.filled   { border-color: var(--accent); opacity: 1; }
  .letter-slot.active-cursor::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
    height: 2px; background: var(--accent2);
    animation: blink 0.9s ease-in-out infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .letter-slot.pop { animation: letterPop 0.18s ease-out; }
  @keyframes letterPop {
    0%   { transform: scale(1.5) translateY(-4px); opacity: 0.5; }
    100% { transform: scale(1)   translateY(0);    opacity: 1;   }
  }

  /* Progress dots */
  .progress { display: flex; gap: 5px; justify-content: center; margin-bottom: 18px; }
  .pdot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); transition: all 0.25s; }
  .pdot.filled { background: var(--accent); box-shadow: 0 0 6px var(--accent); }

  /* Keyboard */
  .keyboard { display: flex; flex-direction: column; gap: 6px; align-items: center; margin-bottom: 14px; }
  .key-row   { display: flex; gap: 5px; justify-content: center; flex-wrap: wrap; }

  .key {
    width: 40px; height: 40px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700;
    color: var(--text); cursor: pointer; transition: all 0.12s;
    user-select: none; position: relative; overflow: hidden; flex-shrink: 0;
  }
  .key.digit-key {
    font-family: 'Cinzel', serif; font-size: 0.9rem;
    background: #1e1230; border-color: #3a2060; color: #b8a0e0;
  }
  .key::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at center, var(--accent) 0%, transparent 70%);
    opacity: 0; transition: opacity 0.25s;
  }
  .key:hover           { background: #3d2168; border-color: var(--accent); color: var(--accent2); box-shadow: var(--glow); transform: translateY(-2px); }
  .key.digit-key:hover { background: #2a1a48; border-color: #8060c0; color: var(--accent2); }
  .key:active, .key.pressed           { transform: scale(0.88); background: #3d2168; border-color: var(--accent); }
  .key:active::after, .key.pressed::after { opacity: 0.2; }

  .key.del-key {
    width: 58px; background: #2a1030; border-color: #5a2050; color: var(--dim);
    font-family: 'Crimson Pro', serif; font-size: 0.78rem; font-weight: 400;
    letter-spacing: 0.04em; font-style: italic;
  }
  .key.del-key:hover { border-color: var(--error); color: var(--error); }

  .key-sep {
    width: 90%; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    opacity: 0.6; margin: 2px 0;
  }

  /* Status */
  .status { text-align: center; height: 30px; display: flex; align-items: center; justify-content: center; }
  .status-text {
    font-family: 'Playfair Display', serif; font-size: 0.88rem;
    font-style: italic; letter-spacing: 0.1em; opacity: 0; transition: opacity 0.3s;
  }
  .status-text.visible { opacity: 1; }
  .status-text.waiting { color: var(--dim); font-size: 0.78rem; font-family: 'Crimson Pro', serif; letter-spacing: 0.2em; text-transform: uppercase; }
  .status-text.fail    { color: var(--error); animation: failShake 0.4s ease-out; }
  @keyframes failShake {
    0%, 100% { transform: translateX(0); }
    20%      { transform: translateX(-7px); }
    40%      { transform: translateX(7px); }
    60%      { transform: translateX(-4px); }
    80%      { transform: translateX(4px); }
  }

  /* Win background glow */
  .win-bg   { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
  .win-glow {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(134,239,172,0.10) 0%, transparent 70%);
    opacity: 0;
  }
  .win-glow.active { animation: glowPulse 2.5s ease-out forwards; }
  @keyframes glowPulse { 0% { opacity:0; transform:scale(0.5); } 30% { opacity:1; } 100% { opacity:0; transform:scale(1.8); } }

  /* Win overlay */
  .win-overlay {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10,5,20,0.88); backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
    padding: 20px;
  }
  .win-overlay.visible { opacity: 1; pointer-events: all; }

  .win-card {
    max-width: 480px; width: 100%;
    background: #1a0f2e; border: 1px solid var(--border);
    border-radius: 18px; padding: 36px 32px 28px;
    text-align: center; position: relative;
    box-shadow: 0 0 80px rgba(192,132,252,0.15);
    animation: cardReveal 0.65s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes cardReveal {
    0%   { transform: scale(0.72) translateY(24px); opacity: 0; }
    100% { transform: scale(1)    translateY(0);    opacity: 1; }
  }
  .win-card::before {
    content: ''; position: absolute; top: -1px; left: 50px; right: 50px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .enigme-num {
    font-family: 'Cinzel', serif; font-size: 0.68rem;
    letter-spacing: 0.4em; color: var(--gold); text-transform: uppercase;
    margin-bottom: 5px; text-shadow: 0 0 12px #fbbf2444;
  }
  .enigme-title {
    font-family: 'Playfair Display', serif; font-weight: 900;
    font-size: clamp(1.3rem, 4vw, 1.9rem); color: var(--accent2);
    text-shadow: 0 0 20px #c084fc66; margin-bottom: 20px;
    letter-spacing: 0.1em;
  }
  .win-rule {
    height: 1px; margin: 0 auto 20px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    width: 80%;
  }

  .win-lines { display: flex; flex-direction: column; gap: 14px; }
  .win-line {
    font-family: 'Crimson Pro', serif; font-style: italic;
    font-size: clamp(0.95rem, 2.8vw, 1.15rem);
    color: #d4b8f0; line-height: 1.6; letter-spacing: 0.02em;
    opacity: 0; transform: translateY(10px);
    animation: lineIn 0.45s ease forwards;
  }
  .win-line:nth-child(1) { animation-delay: 0.25s; }
  .win-line:nth-child(2) { animation-delay: 0.50s; }
  .win-line:nth-child(3) { animation-delay: 0.75s; }
  .win-line:nth-child(4) { animation-delay: 1.00s; }
  @keyframes lineIn { to { opacity: 1; transform: translateY(0); } }

  .win-ornament { margin: 22px 0 6px; font-size: 1rem; color: var(--gold); letter-spacing: 0.6em; opacity: 0.7; }
  .win-close {
    font-family: 'Crimson Pro', serif; font-size: 0.75rem;
    color: var(--dim); letter-spacing: 0.18em; text-transform: uppercase;
    cursor: pointer; transition: color 0.2s; display: inline-block;
  }
  .win-close:hover { color: var(--accent); }

  .particle { position: fixed; pointer-events: none; z-index: 99; border-radius: 50%; }

  .corner-dec { position: absolute; font-size: 0.7rem; color: var(--border); }
  .corner-dec.tl { top: 10px; left: 14px; }
  .corner-dec.tr { top: 10px; right: 14px; }
  .corner-dec.bl { bottom: 10px; left: 14px; }
  .corner-dec.br { bottom: 10px; right: 14px; }

  .ornament {
    display: flex; align-items: center; gap: 12px;
    color: var(--dim); font-size: 0.68rem; letter-spacing: 0.28em;
    text-transform: uppercase; font-family: 'Crimson Pro', serif; font-style: italic;
  }
  .ornament::before, .ornament::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div class="win-bg"><div class="win-glow" id="winGlow"></div></div>

<div class="win-overlay" id="winOverlay" onclick="closeWin()">
  <div class="win-card" onclick="event.stopPropagation()">
    <div class="enigme-num"   id="winNum"></div>
    <div class="enigme-title" id="winTitle"></div>
    <div class="win-rule"></div>
    <div class="win-lines"    id="winLines"></div>
    <div class="win-ornament">✦ ✦ ✦</div>
    <div class="win-close"    onclick="closeWin()">— touchez pour continuer —</div>
  </div>
</div>

<div class="container">
  <div class="header">
    <h1>Codes Secrets</h1>
    <div class="subtitle">3 ou 4 caractères — lettres ou chiffres</div>
  </div>

  <div class="panel">
    <span class="corner-dec tl">✧</span>
    <span class="corner-dec tr">✧</span>
    <span class="corner-dec bl">✧</span>
    <span class="corner-dec br">✧</span>
    <div class="progress" id="progress"></div>
    <div class="display"  id="display"></div>
    <div class="keyboard" id="keyboard"></div>
    <div class="ornament">entrez le code</div>
    <div class="status">
      <div class="status-text waiting visible" id="statusText">Tapez 3 ou 4 caractères</div>
    </div>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════════
//  ENIGMES  –  clé : code saisi en majuscules
// ══════════════════════════════════════════════════════════════════
const ENIGMES = {
  'LCL': {
    num: 'Énigme 3',
    title: 'L · C · L',
    lines: [
      'Il fait rêver les enfants.',
      'Dessus, habillée de carreaux,',
      'Elle atteint toujours son objectif.',
      'Quel est cet objectif ? Notez-le !'
    ]
  },
  'LUNE': {
    num: 'Énigme 4',
    title: 'L · U · N · E',
    lines: [
      'Chevalier, mais aussi astronome à Orléans',
      'Il est membre de l’Académie Royale des Sciences.',
      'Un cratère porte son nom.',
      'Notez-le !'
    ]
  },
  'HUIT': {
    num: 'Énigme 5',
    title: 'H · U · I · T',
    lines: [
      'Secrétaire perpétuel de l’Académie Royale des Sciences.',
      'Il est le porte-parole, à Paris de notre astronome.',
      'Dont il suit les travaux avec enthousiasme.',
      'Notez-le ! Dites sur WhatsApp que vous avez trouvé'
    ]
  },
  '1815': {
    num: 'Énigme 7',
    title: '1 · 8 · 1 · 5',
    lines: [
      'Rendez-vous sur la place,',
      'Où se trouvent les Halles.',
      'Son nom, donne l’illusion, de la capitale',
      'Dites le sur WhatsApp quand vous y êtes!'
    ]
  },
  '1706': {
    num: 'Énigme 9',
    title: '1 · 7 · 0 · 6',
    lines: [
      'Plume au service de la lumière, peu connu pour les sciences,',
      'Il en a néanmoins défendu les idées.',
      'Avec la ferveur de son grand amour,',
      'pour une jeune astronome. Notez-le.',
      'Tapez sa date de naissance.'
    ]
  },
  '1694': {
    num: 'Énigme 10',
    title: '1 · 6 · 9 · 4',
    lines: [
      'Bravo ! Vous avez les 4 personnages principaux,',
      'Ils se sont réunis dans une maison des faubourgs.',
      'A une lieu exactement de la Cathédrale,'
      'Au point le plus au Nord de la Loire.',
      'Un nom qui ne pouvait être que grand et parfait.',
      'Trouvez cette maison et rapportez la photo.',
    ]
  },
'SOLE': {
    num: 'Énigme 11',
    title: 'S · O · L · E',
    lines: [
      'Vous avez normalement une carte complète.',
      'La Galaxie des lumières.',
      'Venez la partager à 20h en bord de Loire,',
      'Là où la sole se dore au soleil.',
    ]
  }
};

const MAX_LEN = 4;
let input  = '';
let locked = false;

// ── Stars ──────────────────────────────────────────────────────────
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const sz = Math.random() * 2 + 0.4;
  s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*4}s;--delay:${Math.random()*5}s;--min-op:${0.08+Math.random()*0.2};--max-op:${0.4+Math.random()*0.45};`;
  starsEl.appendChild(s);
}

// ── Display slots ──────────────────────────────────────────────────
const displayEl = document.getElementById('display');
for (let i = 0; i < MAX_LEN; i++) {
  const slot = document.createElement('div');
  slot.className = 'letter-slot inactive';
  slot.id = 'slot' + i;
  displayEl.appendChild(slot);
}

// ── Progress dots ──────────────────────────────────────────────────
const progressEl = document.getElementById('progress');
for (let i = 0; i < MAX_LEN; i++) {
  const d = document.createElement('div');
  d.className = 'pdot';
  d.id = 'pdot' + i;
  progressEl.appendChild(d);
}

// ── Keyboard ───────────────────────────────────────────────────────
const keyboardEl = document.getElementById('keyboard');

// Row 0 : digits
const digRow = document.createElement('div');
digRow.className = 'key-row';
'1234567890'.split('').forEach(d => {
  const k = makeKey(d, 'digit-key');
  k.onclick = () => pressKey(d, k);
  digRow.appendChild(k);
});
keyboardEl.appendChild(digRow);

// Separator
const sepEl = document.createElement('div');
sepEl.className = 'key-sep';
keyboardEl.appendChild(sepEl);

// Rows 1-3 : AZERTY letters
[
  ['A','Z','E','R','T','Y','U','I','O','P'],
  ['Q','S','D','F','G','H','J','K','L','M'],
  ['W','X','C','V','B','N','⌫']
].forEach(row => {
  const rowEl = document.createElement('div');
  rowEl.className = 'key-row';
  row.forEach(ch => {
    if (ch === '⌫') {
      const k = makeKey('⌫ eff.', 'del-key', '');
      k.onclick = pressDelete;
      rowEl.appendChild(k);
    } else {
      const k = makeKey(ch);
      k.onclick = () => pressKey(ch, k);
      rowEl.appendChild(k);
    }
  });
  keyboardEl.appendChild(rowEl);
});

function makeKey(label, ...extra) {
  const k = document.createElement('div');
  k.className = 'key' + (extra.length ? ' ' + extra.join(' ') : '');
  k.textContent = label;
  return k;
}

// ── Display update ─────────────────────────────────────────────────
function updateDisplay() {
  for (let i = 0; i < MAX_LEN; i++) {
    const slot = document.getElementById('slot' + i);
    const dot  = document.getElementById('pdot' + i);
    slot.classList.remove('active-cursor', 'filled', 'inactive');

    if (i < input.length) {
      slot.textContent = input[i];
      slot.classList.add('filled');
      dot.classList.add('filled');
    } else {
      slot.textContent = '';
      dot.classList.remove('filled');
      if (i === input.length) slot.classList.add('active-cursor');
      else                     slot.classList.add('inactive');
    }
  }
}

// ── Press key ──────────────────────────────────────────────────────
function pressKey(char, keyEl) {
  if (locked || input.length >= MAX_LEN) return;

  input += char;

  // Pop animation on slot
  const slot = document.getElementById('slot' + (input.length - 1));
  slot.classList.add('pop');
  setTimeout(() => slot.classList.remove('pop'), 180);

  // Key pressed animation
  if (keyEl) {
    keyEl.classList.add('pressed');
    setTimeout(() => keyEl.classList.remove('pressed'), 150);
  }

  updateDisplay();

  // Check for match after each keypress
  if (ENIGMES[input]) {
    setTimeout(triggerWin, 300);
  } else if (input.length === MAX_LEN) {
    setTimeout(triggerFail, 300);
  }
}

function pressDelete() {
  if (locked) return;
  if (input.length > 0) {
    input = input.slice(0, -1);
    updateDisplay();
    setStatus('Tapez 3 ou 4 caractères', 'waiting');
  }
}

function setStatus(msg, type) {
  const el = document.getElementById('statusText');
  el.textContent = msg;
  el.className = 'status-text visible ' + type;
}

// ── Win ────────────────────────────────────────────────────────────
function triggerWin() {
  locked = true;
  const enigme = ENIGMES[input];

  // Flash slots green
  for (let i = 0; i < input.length; i++) {
    const s = document.getElementById('slot' + i);
    s.style.color       = '#86efac';
    s.style.textShadow  = '0 0 16px #86efac99';
    s.style.borderColor = '#86efac';
  }

  document.getElementById('winGlow').classList.add('active');
  spawnParticles();

  // Fill card
  document.getElementById('winNum').textContent   = enigme.num;
  document.getElementById('winTitle').textContent = enigme.title;
  const linesEl = document.getElementById('winLines');
  linesEl.innerHTML = '';
  enigme.lines.forEach(txt => {
    const line = document.createElement('div');
    line.className   = 'win-line';
    line.textContent = txt;
    linesEl.appendChild(line);
  });

  setTimeout(() => document.getElementById('winOverlay').classList.add('visible'), 700);
}

function closeWin() {
  document.getElementById('winOverlay').classList.remove('visible');
  setTimeout(reset, 400);
}

// ── Fail ───────────────────────────────────────────────────────────
function triggerFail() {
  locked = true;
  setStatus('Code inconnu…', 'fail');
  for (let i = 0; i < input.length; i++) {
    const s = document.getElementById('slot' + i);
    s.style.color       = '#fca5a5';
    s.style.textShadow  = '0 0 12px #fca5a566';
    s.style.borderColor = '#fca5a5';
  }
  setTimeout(reset, 1200);
}

// ── Reset ──────────────────────────────────────────────────────────
function reset() {
  input  = '';
  locked = false;
  for (let i = 0; i < MAX_LEN; i++) {
    const s = document.getElementById('slot' + i);
    s.style.color = s.style.textShadow = s.style.borderColor = '';
  }
  document.getElementById('winGlow').classList.remove('active');
  document.getElementById('winOverlay').classList.remove('visible');
  updateDisplay();
  setStatus('Tapez 3 ou 4 caractères', 'waiting');
}

// ── Particles ──────────────────────────────────────────────────────
function spawnParticles() {
  const colors = ['#c084fc','#f0abfc','#86efac','#fbbf24','#e879f9','#ff8c00'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const color = colors[i % colors.length];
    const size  = 4 + Math.random() * 8;
    p.style.cssText = `left:${30+Math.random()*40}vw;top:${30+Math.random()*30}vh;width:${size}px;height:${size}px;background:${color};box-shadow:0 0 8px ${color};`;
    document.body.appendChild(p);
    const angle = Math.random() * Math.PI * 2;
    const speed = 60 + Math.random() * 220;
    const dx = Math.cos(angle) * speed, dy = Math.sin(angle) * speed - 60;
    const dur = 900 + Math.random() * 700;
    p.animate([
      { transform: 'translate(0,0) scale(1) rotate(0deg)', opacity: 1 },
      { transform: `translate(${dx}px,${dy}px) scale(0) rotate(${Math.random()*360}deg)`, opacity: 0 }
    ], { duration: dur, easing: 'ease-out', fill: 'forwards' });
    setTimeout(() => p.remove(), dur + 50);
  }
}

// ── Physical keyboard ──────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const upper = e.key.toUpperCase();
  if (/^[A-Z0-9]$/.test(upper)) pressKey(upper, null);
  else if (e.key === 'Backspace') pressDelete();
});

updateDisplay();
</script>
</body>
</html>
